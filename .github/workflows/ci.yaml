name: CI

# Run the project's change-contract gate on every push to master and on every
# pull request. `make verify` builds, vets, checks gofmt, and runs the full test
# suite — which includes the reproducibility golden (the behavioral freeze) and
# the additive-only schema contract. A red check here means a seed's output moved
# or a released serialized field changed.
#
# Runs on macOS (Apple Silicon, arm64) deliberately: the golden hashes in
# internal/scene/testdata/golden.txt are generated on the maintainer's darwin/arm64
# machine, and Go's math transcendentals (Sin/Exp/Pow/…) have per-GOARCH assembly
# that differs in the last bit — so the pixel hashes are architecture-specific. CI
# must match that architecture to verify the golden suite faithfully. (Making the
# goldens portable across architectures would be a separate change.) Building on
# macOS also needs no system packages — ebiten links the platform frameworks.
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (build, vet, gofmt, golden + schema contract)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Runs build + vet + gofmt check + `go test ./...` (golden + contract). This
      # is the same gate the /release skill runs before tagging. The golden suite
      # renders headlessly to an in-memory canvas — no window is opened.
      - name: make verify
        run: make verify
